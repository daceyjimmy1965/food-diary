<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Family Expenses</title>
<style>
:root{
  --bg:#0d0d1a;--surface:#16162a;--surface2:#1e1e35;--border:#2a2a45;
  --accent:#7c6af7;--accent2:#a89ff7;--green:#5ec45e;--red:#e05555;--orange:#e09b30;
  --text:#ffffff;--text2:#c0c0d8;--text3:#9090b0;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Georgia',serif;min-height:100vh;overflow-x:hidden}
input,button,select{font-family:inherit}
input::placeholder{color:var(--text3)}
input:focus{outline:none;border-color:var(--accent)!important}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 16px 12px;position:sticky;top:0;z-index:20}
.header-inner{max-width:500px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.app-title{font-size:20px;font-weight:bold;color:var(--accent2);letter-spacing:1px}
.app-sub{font-size:11px;color:var(--text3);margin-top:1px}
.name-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:10px 16px;position:sticky;top:57px;z-index:19}
.name-bar-inner{max-width:500px;margin:0 auto;display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.name-label{font-size:11px;color:var(--text3);margin-right:2px;white-space:nowrap}
.name-chip{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--text3);font-size:13px;cursor:pointer;transition:all 0.2s;font-weight:bold}
.tabs{display:flex;background:var(--surface);border-bottom:1px solid var(--border)}
.tab{flex:1;padding:11px 0;border:none;background:transparent;color:var(--text3);cursor:pointer;font-size:12px;font-weight:bold;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.container{max-width:500px;margin:0 auto;padding:12px 14px 80px}
.card{background:var(--surface);border-radius:14px;padding:14px;margin:8px 0;border:1px solid var(--border)}
.section-label{font-size:11px;color:var(--text3);margin-bottom:10px;font-weight:bold;letter-spacing:1px;text-transform:uppercase}
.input-field{background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:11px 12px;font-size:15px;width:100%}
.btn-primary{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:13px;font-weight:bold;font-size:15px;cursor:pointer;width:100%;transition:opacity 0.2s}
.btn-primary:disabled{opacity:0.4;cursor:not-allowed}
.btn-small{background:var(--surface2);border:1px solid var(--border);color:var(--text2);padding:8px 12px;font-size:12px;border-radius:8px;cursor:pointer}
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.cat-btn{padding:10px 6px;border-radius:10px;border:1px solid var(--border);background:var(--bg);color:var(--text3);font-size:12px;cursor:pointer;text-align:center;transition:all 0.2s;line-height:1.3}
.cat-btn.active{border-color:var(--accent);background:#2a2a45;color:var(--accent2)}
.expense-card{background:var(--surface);border-radius:10px;padding:11px 13px;margin-bottom:6px;border-left:3px solid var(--accent);display:flex;justify-content:space-between;align-items:center;animation:slideIn 0.2s ease}
@keyframes slideIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.remove-btn{background:none;border:none;color:var(--text3);font-size:20px;cursor:pointer;padding:0 4px;line-height:1;margin-left:8px}
.totals-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:10px 0}
.total-card{background:var(--bg);border-radius:10px;padding:12px;text-align:center;border:1px solid var(--border)}
.sync-ok{background:#0f2a0f;border:1px solid #2a5c2a;border-radius:8px;padding:8px 12px;font-size:12px;color:var(--green);margin:8px 0}
.sync-err{background:#2a1010;border:1px solid #5c2a2a;border-radius:8px;padding:8px 12px;font-size:12px;color:#e07070;margin:8px 0}
.empty-state{text-align:center;color:var(--text3);padding:30px 0;font-size:13px}
.info-text{font-size:11px;color:var(--text3);margin-top:6px;line-height:1.5}
.settings-card{background:var(--surface);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.filter-bar{display:flex;gap:5px;flex-wrap:wrap;margin:10px 0 6px}
.filter-chip{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:var(--bg);color:var(--text3);font-size:12px;cursor:pointer;transition:all 0.2s;font-weight:bold}
.filter-chip.active{background:var(--surface2);color:var(--text)}
.person-goal-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:var(--bg);border-radius:10px;border:1px solid var(--border)}
.person-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.person-goal-name{font-size:14px;font-weight:bold;flex:1}
.person-goal-input{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:14px;width:90px;text-align:right}
.progress-bar-bg{background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;margin-top:4px}
.progress-bar-fill{height:100%;border-radius:4px;transition:width 0.4s}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SHEET_URL='https://script.google.com/macros/s/AKfycbxK0s26J0Z4ES_IRdJ0JsTWAuFf2zVs23aneS1QpjHL1RN0OCbyz7m1mdKGf-Eq2-8U/exec';
const PEOPLE=['Jess','James','Billy','Zac'];
const PERSON_COLORS={Jess:'#f472b6',James:'#60a5fa',Billy:'#34d399',Zac:'#fb923c'};
const CATEGORIES=[
  {icon:'🛒',label:'Groceries'},{icon:'🚗',label:'Fuel'},{icon:'🍔',label:'Eating Out'},
  {icon:'☕',label:'Coffee'},{icon:'🏥',label:'Health'},{icon:'👗',label:'Clothing'},
  {icon:'🎮',label:'Entertainment'},{icon:'📱',label:'Subscriptions'},{icon:'🏠',label:'Household'},
  {icon:'🚌',label:'Transport'},{icon:'📚',label:'Education'},{icon:'💰',label:'Other'},
];

// Default individual goals
const DEFAULT_GOALS={Jess:150,James:150,Billy:100,Zac:100};

let S={
  expenses:{},
  activeTab:'add',
  selectedPerson:localStorage.getItem('fd-person')||'',
  selectedCategory:'',amount:'',note:'',
  selectedDate:'',
  filterPerson:'All',
  personDetail:'',
  summaryPerson:'',
  summaryExpanded:false,
  selectedWeek:'',
  syncStatus:'',lastSync:'',
  weeklyBudget:parseFloat(localStorage.getItem('fd-weekly-budget'))||500,
  personGoals:JSON.parse(localStorage.getItem('fd-person-goals')||JSON.stringify(DEFAULT_GOALS)),
};

function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function weekKey(d){const dt=new Date(d+'T00:00:00');const day=dt.getDay();const diff=dt.getDate()-day+(day===0?-6:1);const m=new Date(dt);m.setDate(diff);return m.getFullYear()+'-'+String(m.getMonth()+1).padStart(2,'0')+'-'+String(m.getDate()).padStart(2,'0')}
function fmtDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})}
function fmtMoney(n){return'$'+(n||0).toFixed(2)}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

function load(){
  try{
    const e=localStorage.getItem('exp-data');if(e)S.expenses=JSON.parse(e);
    const wb=localStorage.getItem('fd-weekly-budget');if(wb)S.weeklyBudget=parseFloat(wb)||500;
    const pg=localStorage.getItem('fd-person-goals');if(pg)S.personGoals=JSON.parse(pg);
    const ls=localStorage.getItem('exp-lastsync');if(ls)S.lastSync=ls;
  }catch(e){}
}
function saveLocal(){
  try{
    localStorage.setItem('exp-data',JSON.stringify(S.expenses));
    localStorage.setItem('fd-person-goals',JSON.stringify(S.personGoals));
    if(S.selectedPerson)localStorage.setItem('fd-person',S.selectedPerson);
  }catch(e){}
}
async function pushToSheet(){
  try{
    const data=JSON.stringify({expenses:S.expenses,weeklyBudget:S.weeklyBudget,personGoals:S.personGoals});
    fetch(SHEET_URL+'?action=set&key=family-expenses&value='+encodeURIComponent(data),{mode:'no-cors'});
    S.lastSync=new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
    S.syncStatus='ok';localStorage.setItem('exp-lastsync',S.lastSync);
  }catch(e){S.syncStatus='error';}
}
async function pullFromSheet(){
  S.syncStatus='pulling';render();
  try{
    const res=await fetch(SHEET_URL+'?action=get&key=family-expenses');
    const json=await res.json();
    if(json&&json.value&&json.value!=='null'){
      const parsed=JSON.parse(json.value);
      // MERGE: combine remote and local expenses, keeping the newer entry when IDs clash
      const remote=parsed.expenses||{};
      const merged={...S.expenses};
      Object.keys(remote).forEach(date=>{
        if(!merged[date]){
          merged[date]=remote[date];
        } else {
          // Add any remote entries whose IDs don't exist locally
          const localIds=new Set(merged[date].map(e=>e.id));
          remote[date].forEach(e=>{ if(!localIds.has(e.id)) merged[date].push(e); });
        }
      });
      S.expenses=merged;
      if(parsed.weeklyBudget)S.weeklyBudget=parsed.weeklyBudget;
      if(parsed.personGoals)S.personGoals=parsed.personGoals;
      S.lastSync=new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
      S.syncStatus='pulled';saveLocal();
      // Push merged data back to sheet so it's up to date
      await pushToSheet();
    }else{S.syncStatus='empty';}
  }catch(e){S.syncStatus='blocked';}
  render();
}
async function saveAndSync(){saveLocal();await pushToSheet();render();}

function addExpense(){
  if(!S.selectedPerson||!S.selectedCategory||!S.amount)return;
  const amt=parseFloat(S.amount);if(isNaN(amt)||amt<=0)return;
  const dateEl=document.getElementById('date-input');
  const entryDate=(dateEl&&dateEl.value)?dateEl.value:today();
  const time=new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
  const entry={id:Date.now(),person:S.selectedPerson,category:S.selectedCategory,amount:amt,note:S.note.trim(),time,date:entryDate};
  if(!S.expenses[entryDate])S.expenses[entryDate]=[];
  S.expenses[entryDate].push(entry);
  S.amount='';S.note='';
  saveAndSync();
}
function removeExpense(date,id){
  S.expenses[date]=S.expenses[date].filter(e=>e.id!==id);
  if(!S.expenses[date].length)delete S.expenses[date];
  saveAndSync();
}
function saveSettings(){
  const wb=document.getElementById('wb-input');
  if(wb&&wb.value)S.weeklyBudget=parseFloat(wb.value)||500;
  localStorage.setItem('fd-weekly-budget',String(S.weeklyBudget));
  // Save individual goals
  PEOPLE.forEach(p=>{
    const el=document.getElementById('goal-'+p);
    if(el&&el.value)S.personGoals[p]=parseFloat(el.value)||0;
  });
  saveAndSync();
  alert('Settings saved!');render();
}
function exportData(){
  const d=JSON.stringify({expenses:S.expenses,weeklyBudget:S.weeklyBudget,personGoals:S.personGoals},null,2);
  const blob=new Blob([d],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='family-expenses-'+today()+'.json';a.click();
}
function bindInputs(){
  const ai=document.getElementById('amount-input');
  if(ai){ai.addEventListener('input',e=>{S.amount=e.target.value;});ai.addEventListener('keydown',e=>{if(e.key==='Enter')addExpense();});}
  const ni=document.getElementById('note-input');
  if(ni)ni.addEventListener('input',e=>{S.note=e.target.value;});
  const di=document.getElementById('date-input');
  if(di)di.addEventListener('change',e=>{S.selectedDate=e.target.value;});
}

function weeklyPersonCats(person){
  // Get all expenses for this person in the current week
  const allDays=Object.keys(S.expenses);
  const now=new Date();
  const day=now.getDay();
  const monOffset=day===0?-6:1-day;
  const mon=new Date(now);mon.setDate(now.getDate()+monOffset);mon.setHours(0,0,0,0);
  const sun=new Date(mon);sun.setDate(mon.getDate()+6);sun.setHours(23,59,59,999);
  const catTotals={};let weekTotal=0;
  allDays.forEach(date=>{
    const d=new Date(date+'T00:00:00');
    if(d>=mon&&d<=sun){
      (S.expenses[date]||[]).filter(e=>e.person===person).forEach(e=>{
        catTotals[e.category]=(catTotals[e.category]||0)+e.amount;
        weekTotal+=e.amount;
      });
    }
  });
  return{catTotals,weekTotal};
}

// ── RENDER HELPERS ──
function personProgressBar(person, spent){
  const goal=S.personGoals[person]||0;
  if(!goal)return'';
  const pct=Math.min((spent/goal)*100,100);
  const over=spent>goal;
  const color=over?'var(--red)':pct>85?'var(--orange)':'var(--green)';
  return`<div>
    <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-bottom:3px">
      <span>${fmtMoney(spent)} of ${fmtMoney(goal)} goal</span>
      <span style="color:${color}">${over?'▲ '+fmtMoney(spent-goal)+' over':'▼ '+fmtMoney(goal-spent)+' left'}</span>
    </div>
    <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%;background:${color}"></div></div>
  </div>`;
}

function renderAdd(){
  const t=today();
  const allTodayExpenses=(S.expenses[t]||[]).slice().reverse();
  const filtered=S.filterPerson==='All'?allTodayExpenses:allTodayExpenses.filter(e=>e.person===S.filterPerson);
  const filteredTotal=filtered.reduce((s,e)=>s+e.amount,0);
  const allTotal=allTodayExpenses.reduce((s,e)=>s+e.amount,0);
  const canAdd=S.selectedPerson&&S.selectedCategory&&S.amount&&parseFloat(S.amount)>0;

  let h='';

  if(allTodayExpenses.length>0){
    h+=`<div style="background:var(--surface2);border-radius:12px;padding:12px 14px;margin-bottom:8px;border:1px solid var(--border)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div style="font-size:12px;color:var(--text3)">Today's total — ${fmtDate(t)}</div>
        <div style="font-size:22px;font-weight:bold;color:var(--accent2)">${fmtMoney(allTotal)}</div>
      </div>
      <div style="display:flex;gap:8px">
        ${PEOPLE.map(p=>{
          const amt=(S.expenses[t]||[]).filter(e=>e.person===p).reduce((s,e)=>s+e.amount,0);
          if(amt===0)return'';
          return`<div style="flex:1;text-align:center;background:var(--bg);border-radius:8px;padding:6px 4px;border:1px solid var(--border)">
            <div style="font-size:13px;font-weight:bold;color:${PERSON_COLORS[p]}">${fmtMoney(amt)}</div>
            <div style="font-size:10px;color:var(--text3)">${p}</div>
          </div>`;
        }).join('')}
      </div>
    </div>`;
  }

  const curDate=S.selectedDate||today();
  h+=`<div class="card">
    <div class="section-label">ADD EXPENSE</div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Amount ($)</div>
        <input id="amount-input" class="input-field" type="number" step="0.01" placeholder="0.00" value="${esc(S.amount)}" style="font-size:22px;font-weight:bold;color:var(--accent2)">
      </div>
      <div style="flex:1">
        <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Note (optional)</div>
        <input id="note-input" class="input-field" placeholder="e.g. Woolworths" value="${esc(S.note)}">
      </div>
    </div>
    <div style="margin-bottom:10px">
      <div style="font-size:11px;color:var(--text3);margin-bottom:4px">Date</div>
      <input id="date-input" class="input-field" type="date" value="${curDate}" style="font-size:14px;color:var(--text);background:var(--surface2);border-color:var(--accent);color-scheme:dark;">
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:6px">Category</div>
    <div class="cat-grid">
      ${CATEGORIES.map(c=>`<button class="cat-btn ${S.selectedCategory===c.label?'active':''}" onclick="S.selectedCategory='${c.label}';render()">${c.icon}<br>${c.label}</button>`).join('')}
    </div>
    <button class="btn-primary" style="margin-top:10px" onclick="addExpense()"${!canAdd?' disabled':''}>
      ${canAdd?`Add ${S.selectedPerson}'s ${S.selectedCategory}`:'Select category & amount'}
    </button>
  </div>`;

  h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin:14px 0 6px">
    <div style="font-size:12px;color:var(--text3);font-weight:bold">TODAY'S LOG</div>
    <div style="font-size:12px;color:var(--accent2);font-weight:bold">${fmtMoney(filteredTotal)}</div>
  </div>
  <div class="filter-bar">
    <button class="filter-chip ${S.filterPerson==='All'?'active':''}" onclick="S.filterPerson='All';S.personDetail='';render()" style="${S.filterPerson==='All'?'border-color:var(--accent2);color:var(--accent2)':''}">👥 All</button>
    ${PEOPLE.map(p=>`<button class="filter-chip ${S.filterPerson===p?'active':''}" onclick="S.filterPerson='${p}';S.personDetail=S.personDetail==='${p}'?'':'${p}';render()" style="${S.filterPerson===p?'border-color:'+PERSON_COLORS[p]+';color:'+PERSON_COLORS[p]+';background:'+PERSON_COLORS[p]+'22':''}">
      ${p}
    </button>`).join('')}
  </div>
  ${S.personDetail?renderPersonWeekDetail(S.personDetail):''}`;

  if(filtered.length===0){
    h+=`<div class="empty-state">${S.filterPerson==='All'?'No expenses logged today yet!':'No expenses from '+S.filterPerson+' today.'}</div>`;
  }else{
    h+=filtered.map(e=>`<div class="expense-card" style="border-left-color:${PERSON_COLORS[e.person]||'var(--accent)'}">
      <div>
        <div style="font-size:14px;color:var(--text)">${CATEGORIES.find(c=>c.label===e.category)?.icon||'💰'} ${esc(e.category)}${e.note?' — '+esc(e.note):''}</div>
        <div style="font-size:11px;color:${PERSON_COLORS[e.person]};margin-top:2px">${e.person}</div>
        <div style="font-size:11px;color:var(--text3)">${e.time}</div>
      </div>
      <div style="display:flex;align-items:center">
        <span style="font-size:16px;font-weight:bold;color:var(--accent2)">${fmtMoney(e.amount)}</span>
        <button class="remove-btn" onclick="removeExpense('${t}',${e.id})">×</button>
      </div>
    </div>`).join('');
  }
  return h;
}

function fmtWeekLabel(wk){
  const s=new Date(wk+'T00:00:00');
  const e=new Date(wk+'T00:00:00');e.setDate(e.getDate()+6);
  return s.toLocaleDateString('en-AU',{day:'numeric',month:'short'})+' – '+e.toLocaleDateString('en-AU',{day:'numeric',month:'short'});
}

function renderSummary(){
  const allDays=Object.keys(S.expenses).sort().reverse();
  if(allDays.length===0)return`<div class="empty-state" style="padding:50px 0">No expenses logged yet!</div>`;

  const weeks={};
  allDays.forEach(date=>{
    const wk=weekKey(date);
    if(!weeks[wk])weeks[wk]={entries:[],total:0,byPerson:{},byCategory:{}};
    (S.expenses[date]||[]).forEach(e=>{
      weeks[wk].entries.push(e);
      weeks[wk].total+=e.amount;
      weeks[wk].byPerson[e.person]=(weeks[wk].byPerson[e.person]||0)+e.amount;
      weeks[wk].byCategory[e.category]=(weeks[wk].byCategory[e.category]||0)+e.amount;
    });
  });
  const wkKeys=Object.keys(weeks).sort().reverse().slice(0,8);

  // Week selector
  if(!S.selectedWeek||!weeks[S.selectedWeek])S.selectedWeek=wkKeys[0]||'';
  const weekOptions=wkKeys.map(wk=>'<option value="'+wk+'"'+(wk===S.selectedWeek?' selected':'')+'>'+fmtWeekLabel(wk)+'</option>').join('');

  let h='<div style="margin-bottom:12px">';
  h+='<div style="font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:bold;letter-spacing:1px;text-transform:uppercase">Select Week</div>';
  h+='<select onchange="S.selectedWeek=this.value;S.summaryPerson=\'\';render()" style="width:100%;background:var(--surface2);border:1px solid var(--accent);border-radius:10px;color:var(--text);padding:11px 12px;font-size:15px;font-family:inherit;outline:none;">';
  h+=weekOptions;
  h+='</select></div>';

  let h2='';
  const thisWk=S.selectedWeek;
  if(thisWk&&weeks[thisWk]){
    const w=weeks[thisWk];
    const we=new Date(thisWk+'T00:00:00');we.setDate(we.getDate()+6);
    const pct=Math.min((w.total/S.weeklyBudget)*100,100);
    const over=w.total>S.weeklyBudget;

    h2+=`<div class="card" style="margin-top:8px">
      <div class="section-label">THIS WEEK</div>
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">
        <div style="font-size:12px;color:var(--text3)">${new Date(thisWk+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'})} – ${we.toLocaleDateString('en-AU',{day:'numeric',month:'short'})}</div>
        <div style="text-align:right">
          <div style="font-size:28px;font-weight:bold;color:${over?'var(--red)':'var(--accent2)'}">${fmtMoney(w.total)}</div>
          <div style="font-size:11px;color:var(--text3)">of ${fmtMoney(S.weeklyBudget)} family budget</div>
        </div>
      </div>
      <div style="background:var(--surface2);border-radius:6px;height:8px;overflow:hidden;margin-bottom:16px">
        <div style="width:${pct}%;height:100%;background:${over?'var(--red)':'var(--accent)'};border-radius:6px;transition:width 0.4s"></div>
      </div>

      <div class="section-label">BY PERSON <span style="font-size:9px;color:var(--text3);font-weight:normal;letter-spacing:0">(tap to see expenses)</span></div>
      ${PEOPLE.map(p=>{
        const spent=w.byPerson[p]||0;
        const goal=S.personGoals[p]||0;
        const pctP=goal?Math.min((spent/goal)*100,100):0;
        const overP=goal&&spent>goal;
        const barColor=overP?'var(--red)':pctP>85?'var(--orange)':PERSON_COLORS[p];
        const isOpen=S.summaryPerson===p;
        const wkStart=new Date(thisWk+'T00:00:00');
        const wkEnd=new Date(thisWk+'T00:00:00');wkEnd.setDate(wkEnd.getDate()+6);wkEnd.setHours(23,59,59,999);
        const personEntries=w.entries.filter(e=>e.person===p&&(()=>{const d=new Date(e.date+'T00:00:00');return d>=wkStart&&d<=wkEnd;})()).sort((a,b)=>b.id-a.id);
        let detailHtml='';
        if(isOpen){
          if(personEntries.length>0){
            detailHtml=personEntries.map(e=>'<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-top:1px solid var(--border)"><div><div style="font-size:13px;color:var(--text)">'+(CATEGORIES.find(c=>c.label===e.category)?.icon||'💰')+' '+esc(e.category)+(e.note?' — '+esc(e.note):'')+' </div><div style="font-size:10px;color:var(--text3)">'+fmtDate(e.date)+' · '+e.time+'</div></div><span style="font-size:14px;font-weight:bold;color:var(--accent2)">'+fmtMoney(e.amount)+'</span></div>').join('');
          } else {
            detailHtml='<div style="font-size:12px;color:var(--text3);padding-top:8px;border-top:1px solid var(--border)">No expenses this week</div>';
          }
        }
        const borderCol=isOpen?PERSON_COLORS[p]:'var(--border)';
        const arrow=isOpen?'▲':'▼';
        let html='<div style="margin-bottom:12px;padding:10px;background:var(--bg);border-radius:10px;border:1px solid '+borderCol+';cursor:pointer" onclick="S.summaryPerson=S.summaryPerson===\''+p+'\'?\'\':\''+p+'\';render()">';
        html+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
        html+='<div style="display:flex;align-items:center;gap:8px">';
        html+='<div style="width:10px;height:10px;border-radius:50%;background:'+PERSON_COLORS[p]+'"></div>';
        html+='<span style="font-size:14px;font-weight:bold;color:'+PERSON_COLORS[p]+'">'+p+'</span>';
        html+='<span style="font-size:11px;color:var(--text3)">'+arrow+'</span>';
        html+='</div>';
        html+='<div style="text-align:right">';
        html+='<span style="font-size:18px;font-weight:bold;color:'+(overP?'var(--red)':'var(--text)')+'">'+fmtMoney(spent)+'</span>';
        if(goal)html+='<span style="font-size:11px;color:var(--text3)"> / '+fmtMoney(goal)+'</span>';
        html+='</div></div>';
        if(goal){
          html+='<div class="progress-bar-bg"><div class="progress-bar-fill" style="width:'+pctP+'%;background:'+barColor+'"></div></div>';
          html+='<div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text3);margin-top:3px">';
          html+='<span>'+Math.round(pctP)+'% of goal</span>';
          html+='<span style="color:'+barColor+'">'+(overP?'▲ '+fmtMoney(spent-goal)+' over':'▼ '+fmtMoney(goal-spent)+' remaining')+'</span>';
          html+='</div>';
        } else {
          html+='<div style="font-size:10px;color:var(--text3)">No goal set</div>';
        }
        html+=detailHtml;
        html+='</div>';
        return html;
      }).join('')}

      ${(()=>{
        // If a person is selected, show their category breakdown; otherwise show family totals
        const person=S.selectedPerson||'';
        const wkStart=new Date(thisWk+'T00:00:00');
        const wkEnd=new Date(thisWk+'T00:00:00');wkEnd.setDate(wkEnd.getDate()+6);wkEnd.setHours(23,59,59,999);
        let catData={};
        let catTotal=0;
        if(person){
          w.entries.filter(e=>e.person===person&&(()=>{const d=new Date(e.date+'T00:00:00');return d>=wkStart&&d<=wkEnd;})()).forEach(e=>{
            catData[e.category]=(catData[e.category]||0)+e.amount;
            catTotal+=e.amount;
          });
        } else {
          catData=w.byCategory;
          catTotal=w.total;
        }
        const label=person&&PERSON_COLORS[person]?PERSON_COLORS[person]:'var(--accent2)';
        const title=person?person+"'s Categories":'TOTAL CATEGORIES';
        const color=person?PERSON_COLORS[person]:'var(--accent)';
        const entries=Object.entries(catData).sort((a,b)=>b[1]-a[1]).slice(0,8);
        if(!entries.length)return'<div class="section-label" style="margin-top:4px">'+title+'</div><div style="font-size:12px;color:var(--text3)">No expenses for this period.</div>';
        return'<div class="section-label" style="margin-top:4px;color:'+label+'">'+title+'</div>'+entries.map(([cat,amt])=>{
          const icon=CATEGORIES.find(c=>c.label===cat)?.icon||'💰';
          const pct2=catTotal>0?Math.min((amt/catTotal)*100,100):0;
          return'<div style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px"><span>'+icon+' '+cat+'</span><span style="color:var(--accent2);font-weight:bold">'+fmtMoney(amt)+'</span></div><div style="background:var(--surface2);border-radius:4px;height:4px;overflow:hidden"><div style="width:'+pct2+'%;height:100%;background:'+color+';border-radius:4px"></div></div></div>';
        }).join('');
      })()}
    </div>`;
  }

  return h+h2;
}

function renderSettings(){
  return`
    <div class="settings-card" style="margin-top:8px">
      <div class="section-label">💰 FAMILY WEEKLY BUDGET</div>
      <div style="display:flex;gap:8px;align-items:center">
        <input id="wb-input" class="input-field" type="number" value="${esc(String(S.weeklyBudget))}" style="flex:1;font-size:18px;font-weight:bold">
        <span style="font-size:14px;color:var(--text3)">/week</span>
      </div>
      <div class="info-text">Total family weekly spending target</div>
    </div>

    <div class="settings-card">
      <div class="section-label">🎯 INDIVIDUAL WEEKLY GOALS</div>
      <div class="info-text" style="margin-bottom:12px">Set a personal weekly spending limit for each family member. Leave at 0 for no limit.</div>
      ${PEOPLE.map(p=>`<div class="person-goal-row">
        <div class="person-dot" style="background:${PERSON_COLORS[p]}"></div>
        <div class="person-goal-name" style="color:${PERSON_COLORS[p]}">${p}</div>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:14px;color:var(--text3)">$</span>
          <input id="goal-${p}" class="person-goal-input" type="number" value="${esc(String(S.personGoals[p]||0))}" placeholder="0">
          <span style="font-size:12px;color:var(--text3)">/wk</span>
        </div>
      </div>`).join('')}
    </div>

    <button class="btn-primary" style="margin-bottom:10px" onclick="saveSettings()">Save All Settings</button>

    <div class="settings-card">
      <div class="section-label">☁️ SYNC</div>
      <div class="info-text" style="margin-bottom:10px">All expenses save to Google Sheets automatically. Pull to load data on a new device.</div>
      <button class="btn-small" style="width:100%;margin-bottom:6px" onclick="pullFromSheet()">⬇️ Pull from Google Sheets</button>
      ${S.lastSync?`<div style="font-size:11px;color:#2a5c2a;margin-top:4px">Last sync: ${S.lastSync}</div>`:''}
      ${S.syncStatus==='ok'?`<div class="sync-ok">✓ Saved to Google Sheets</div>`:''}
      ${S.syncStatus==='blocked'||S.syncStatus==='error'?`<div class="sync-err">⚠️ Could not reach Google Sheets. Data saved locally.</div>`:''}
    </div>

    <div class="settings-card">
      <div class="section-label">💾 BACKUP</div>
      <button class="btn-small" style="width:100%" onclick="exportData()">⬇️ Export All Data (JSON)</button>
      <div class="info-text">Export regularly as a safety backup.</div>
    </div>

    <div style="text-align:center;color:var(--text3);font-size:11px;margin-top:20px;padding:10px;line-height:1.8">
      💜 Family Expenses · Dacey Family<br>
      Data stored privately in this browser + Google Sheets
    </div>`;
}

function renderPersonWeekDetail(person){
  const {catTotals,weekTotal}=weeklyPersonCats(person);
  const goal=S.personGoals[person]||0;
  const color=PERSON_COLORS[person];
  const cats=Object.entries(catTotals).sort((a,b)=>b[1]-a[1]);
  if(!cats.length)return`<div style="background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);border-top:3px solid ${color}">
    <div style="font-size:12px;color:${color};font-weight:bold;margin-bottom:6px">${person} — This Week</div>
    <div style="font-size:12px;color:var(--text3)">No spending this week yet.</div>
  </div>`;
  let h=`<div style="background:var(--surface);border-radius:12px;padding:14px;margin-bottom:8px;border:1px solid var(--border);border-top:3px solid ${color}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;color:${color};font-weight:bold">${person} — This Week</div>
      <div style="font-size:18px;font-weight:bold;color:var(--text)">${fmtMoney(weekTotal)}${goal?`<span style="font-size:11px;color:var(--text3)"> / ${fmtMoney(goal)}</span>`:''}</div>
    </div>`;
  if(goal){
    const pct=Math.min((weekTotal/goal)*100,100);
    const over=weekTotal>goal;
    const barCol=over?'var(--red)':pct>85?'var(--orange)':color;
    h+=`<div style="background:var(--surface2);border-radius:4px;height:6px;overflow:hidden;margin-bottom:12px">
      <div style="width:${pct}%;height:100%;background:${barCol};border-radius:4px;transition:width 0.4s"></div>
    </div>`;
  }
  h+=cats.map(([cat,amt])=>{
    const icon=CATEGORIES.find(c=>c.label===cat)?.icon||'💰';
    const pct2=weekTotal>0?Math.min((amt/weekTotal)*100,100):0;
    return`<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px">
      <div style="width:28px;text-align:center;font-size:16px">${icon}</div>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:3px">
          <span style="color:var(--text2)">${cat}</span>
          <span style="color:var(--accent2);font-weight:bold">${fmtMoney(amt)}</span>
        </div>
        <div style="background:var(--surface2);border-radius:3px;height:4px;overflow:hidden">
          <div style="width:${pct2}%;height:100%;background:${color};border-radius:3px"></div>
        </div>
      </div>
    </div>`;
  }).join('');
  h+=`</div>`;
  return h;
}

function render(){
  const syncDot=S.syncStatus==='ok'?` <span style="color:var(--green);font-size:10px">✓</span>`:S.syncStatus==='error'?` <span style="color:var(--red);font-size:10px">⚠</span>`:'';
  const header=`<div class="header"><div class="header-inner">
    <div><div class="app-title">💜 Family Expenses</div><div class="app-sub">Dacey family tracker${syncDot}</div></div>
    <div style="font-size:12px;color:var(--text3)">Budget: <span style="color:var(--accent2);font-weight:bold">$${S.weeklyBudget}/wk</span></div>
  </div></div>`;

  const nameBar=`<div class="name-bar"><div class="name-bar-inner">
    <div class="name-label">Who are you?</div>
    ${PEOPLE.map(p=>`<button class="name-chip ${S.selectedPerson===p?'active':''}" onclick="S.selectedPerson='${p}';localStorage.setItem('fd-person','${p}');render()" style="${S.selectedPerson===p?'border-color:'+PERSON_COLORS[p]+';background:'+PERSON_COLORS[p]+'22;color:'+PERSON_COLORS[p]:''}">
      ${p}
    </button>`).join('')}
  </div></div>`;

  const tabs=`<div class="tabs">
    ${[['add','➕ Add'],['summary','📊 Summary'],['settings','⚙️ Settings']].map(([id,label])=>`<button class="tab ${S.activeTab===id?'active':''}" onclick="S.activeTab='${id}';render()">${label}</button>`).join('')}
  </div>`;

  const content=S.activeTab==='add'?renderAdd():S.activeTab==='summary'?renderSummary():renderSettings();
  document.getElementById('app').innerHTML=header+nameBar+tabs+`<div class="container">${content}</div>`;
  bindInputs();
}

S.selectedDate=today();load();render();
</script>
</body>
</html>
