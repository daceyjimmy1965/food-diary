<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Food Diary</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0f1a0f;color:#e8f0e8;font-family:Georgia,serif;min-height:100vh}
input,textarea,button{font-family:inherit}
input::placeholder{color:#2a4a2a}
input:focus,textarea:focus{outline:none;border-color:#5ec45e!important}
.header{background:#162216;border-bottom:1px solid #2a3d2a;padding:16px 20px 12px}
.header-inner{max-width:480px;margin:0 auto;display:flex;justify-content:space-between;align-items:center}
.title{font-size:21px;font-weight:bold;color:#7ec87e;letter-spacing:1px}
.subtitle{font-size:11px;color:#3a5e3a;margin-top:1px;display:flex;gap:6px;align-items:center}
.goal-display{cursor:pointer;color:#4a8c4a;font-size:12px}
.container{max-width:480px;margin:0 auto;padding:0 14px 80px}
.tabs{display:flex;margin:14px 0 0;background:#162216;border-radius:10px;padding:4px;gap:3px}
.tab{flex:1;background:transparent;color:#4a8c4a;border:none;border-radius:7px;padding:9px 0;cursor:pointer;font-weight:bold;font-size:12px;transition:all 0.2s}
.tab.active{background:#5ec45e;color:#0f1a0f}
.card{background:#162216;border-radius:14px;padding:14px;margin:10px 0}
.section-label{font-size:12px;color:#4a8c4a;margin-bottom:8px;font-weight:bold}
.input-field{background:#0f1a0f;border:1px solid #2a3d2a;border-radius:8px;color:#e8f0e8;padding:10px 11px;font-size:14px;width:100%}
.btn{border:none;border-radius:8px;padding:11px 16px;font-weight:bold;font-size:15px;cursor:pointer}
.btn-primary{background:#5ec45e;color:#0f1a0f}
.btn-primary:disabled{background:#2a3d2a;color:#3a5e3a}
.btn-secondary{background:#1a3d2a;border:1px solid #2a6e3a;color:#5ec45e;font-size:12px;padding:10px 11px;font-weight:bold;white-space:nowrap;border-radius:8px;cursor:pointer}
.btn-small{background:#1a2e1a;border:1px solid #2a3d2a;color:#4a8c4a;padding:10px 12px;font-size:12px;border-radius:8px;cursor:pointer}
.entry-card{background:#162216;border-radius:10px;padding:11px 13px;margin-bottom:6px;border-left:3px solid #2a5c2a;display:flex;justify-content:space-between;align-items:center}
.entry-name{font-size:14px;color:#e8f0e8}
.entry-meta{font-size:11px;color:#3a5e3a;margin-top:1px}
.entry-cal{font-size:15px;font-weight:bold;color:#7ec87e}
.remove-btn{background:none;border:none;color:#3a4e3a;font-size:18px;cursor:pointer;margin-left:9px}
.lookup-result{background:#0f2a1a;border:1px solid #2a5c2a;border-radius:8px;padding:9px 11px;margin-bottom:9px;font-size:13px}
.lookup-error{background:#2a1010;border:1px solid #5c2a2a;border-radius:8px;padding:9px 11px;margin-bottom:9px;font-size:13px;color:#e07070}
.empty-state{text-align:center;color:#2a3d2a;padding:30px 0;font-size:13px}
.ring-card{display:flex;align-items:center;gap:18px;padding:18px 16px}
.macro-bar-container{flex:1}
.macro-bar-label{display:flex;justify-content:space-between;font-size:10px;color:#4a6e4a;margin-bottom:3px}
.macro-bar-bg{background:#1e2e1e;border-radius:4px;height:5px;overflow:hidden}
.macro-bar-fill{height:100%;border-radius:4px;transition:width 0.4s}
.unit-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid #2a3d2a}
.unit-btn{background:#0f1a0f;color:#3a5e3a;border:none;padding:0 14px;cursor:pointer;font-size:13px;font-weight:bold}
.unit-btn.active{background:#2a5c2a;color:#7ec87e}
.settings-section{background:#162216;border-radius:12px;padding:14px;margin-bottom:10px}
.api-key-input{background:#0f1a0f;border:1px solid #2a3d2a;border-radius:8px;color:#e8f0e8;padding:10px 11px;font-size:13px;width:100%;font-family:monospace}
.info-text{font-size:11px;color:#2a4a2a;margin-top:7px;line-height:1.5}
.alert-banner{background:#2a1a0a;border:1px solid #6e4a1a;border-radius:10px;padding:10px 14px;margin:12px 0;font-size:12px;color:#c0844a}
.sync-banner{background:#0f2a1a;border:1px solid #2a5c2a;border-radius:10px;padding:10px 14px;margin:10px 0;font-size:12px;color:#5ec45e;display:flex;justify-content:space-between;align-items:center}
</style>
</head>
<body>
<div id="app"></div>
<script>
const SHEET_URL='https://script.google.com/macros/s/AKfycbxK0s26J0Z4ES_IRdJ0JsTWAuFf2zVs23aneS1QpjHL1RN0OCbyz7m1mdKGf-Eq2-8U/exec';
let state={entries:{},weights:{},goal:2000,weightUnit:'kg',activeTab:'today',deepseekKey:'',foodName:'',calories:'',protein:'',carbs:'',fat:'',weightInput:'',lookupStatus:'',lookupNote:'',lookupConfidence:'',showMacros:false,editGoal:false,goalInput:'2000',syncStatus:'',lastSync:''};
const MG={protein:150,carbs:200,fat:65};

function loadLocal(){
  try{const s=localStorage.getItem('fd-state');if(s){const l=JSON.parse(s);state.entries=l.entries||{};state.weights=l.weights||{};state.goal=l.goal||2000;state.weightUnit=l.weightUnit||'kg';state.deepseekKey=l.deepseekKey||'';state.lastSync=l.lastSync||'';state.goalInput=String(state.goal);}}catch(e){}
}
function saveLocal(){
  try{localStorage.setItem('fd-state',JSON.stringify({entries:state.entries,weights:state.weights,goal:state.goal,weightUnit:state.weightUnit,deepseekKey:state.deepseekKey,lastSync:state.lastSync}));}catch(e){}
}

// Push data to sheet using no-cors (fire and forget)
async function pushToSheet(){
  try{
    const data=JSON.stringify({entries:state.entries,weights:state.weights,goal:state.goal});
    const url=SHEET_URL+'?action=set&key=food-diary-data&value='+encodeURIComponent(data);
    fetch(url,{method:'GET',mode:'no-cors'});
    state.lastSync=new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
    state.syncStatus='pushed';
    saveLocal();
  }catch(e){state.syncStatus='error';}
}

// Pull uses an iframe trick to get around CORS
async function pullFromSheet(){
  state.syncStatus='pulling';render();
  try{
    // Use a script tag to load JSONP-style
    const callbackName='fd_callback_'+Date.now();
    window[callbackName]=function(data){
      if(data&&data.value&&data.value!=='null'){
        try{
          const parsed=JSON.parse(data.value);
          state.entries=parsed.entries||{};
          state.weights=parsed.weights||{};
          state.goal=parsed.goal||2000;
          state.goalInput=String(state.goal);
          state.lastSync=new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
          state.syncStatus='pulled';
          saveLocal();
        }catch(e){state.syncStatus='parse-error';}
      }else{
        state.syncStatus='empty';
      }
      render();
      delete window[callbackName];
    };
    // Try direct fetch first
    const res=await fetch(SHEET_URL+'?action=get&key=food-diary-data');
    const json=await res.json();
    window[callbackName](json);
  }catch(e){
    // If blocked, show manual instructions
    state.syncStatus='blocked';
    render();
  }
}

async function saveAndSync(){
  saveLocal();
  await pushToSheet();
  render();
}

function getTodayKey(){return new Date().toISOString().slice(0,10)}
function formatDate(d){return new Date(d+'T00:00:00').toLocaleDateString('en-AU',{weekday:'short',day:'numeric',month:'short'})}
function getWeekKey(dateStr){const d=new Date(dateStr+'T00:00:00');const day=d.getDay();const diff=d.getDate()-day+(day===0?-6:1);const mon=new Date(d);mon.setDate(diff);return mon.toISOString().slice(0,10)}
function esc(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}

async function lookupNutrition(description){
  if(!state.deepseekKey){alert('Please set your DeepSeek API key in Settings first!');return null}
  const response=await fetch('https://api.deepseek.com/chat/completions',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+state.deepseekKey},body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:'You are a nutrition expert. Return ONLY a JSON object, no markdown, no code fences: {"calories": 350, "protein": 28, "carbs": 45, "fat": 8, "description": "clean name", "confidence": "high", "note": "brief note under 80 chars"}. If unknown set numeric fields to null.'},{role:'user',content:description}],temperature:0.3,max_tokens:300})});
  if(!response.ok)throw new Error('API error: '+await response.text());
  const data=await response.json();
  return JSON.parse(data.choices[0].message.content.replace(/```json|```/g,'').trim());
}

async function handleLookup(){
  const name=state.foodName.trim();if(!name)return;
  state.lookupStatus='loading';state.lookupNote='';state.calories='';state.protein='';state.carbs='';state.fat='';render();
  try{
    const r=await lookupNutrition(name);
    if(r&&r.calories!==null){state.calories=String(r.calories);state.protein=String(r.protein||'');state.carbs=String(r.carbs||'');state.fat=String(r.fat||'');state.foodName=r.description||name;state.lookupNote=r.note||'';state.lookupConfidence=r.confidence||'';state.lookupStatus='done';state.showMacros=true;}
    else{state.lookupNote=(r&&r.note)||'Could not find nutrition info.';state.lookupStatus='error';}
  }catch(e){state.lookupNote='Lookup failed: '+e.message;state.lookupStatus='error';}
  render();
}

async function addEntry(){
  const name=state.foodName.trim();const cal=parseInt(state.calories);
  if(!name||isNaN(cal)||cal<=0)return;
  const today=getTodayKey();const time=new Date().toLocaleTimeString('en-AU',{hour:'2-digit',minute:'2-digit'});
  const entry={id:Date.now(),name,cal,time,protein:parseInt(state.protein)||0,carbs:parseInt(state.carbs)||0,fat:parseInt(state.fat)||0};
  if(!state.entries[today])state.entries[today]=[];
  state.entries[today].push(entry);
  state.foodName='';state.calories='';state.protein='';state.carbs='';state.fat='';state.lookupStatus='';state.lookupNote='';state.showMacros=false;
  await saveAndSync();
}
async function removeEntry(date,id){state.entries[date]=state.entries[date].filter(e=>e.id!==id);if(state.entries[date].length===0)delete state.entries[date];await saveAndSync();}
async function saveGoal(){const g=parseInt(state.goalInput);if(!isNaN(g)&&g>0)state.goal=g;state.editGoal=false;await saveAndSync();}
async function logWeight(){const w=parseFloat(state.weightInput);if(isNaN(w)||w<=0)return;state.weights[getTodayKey()]={value:w,unit:state.weightUnit};state.weightInput='';await saveAndSync();}
async function removeWeight(date){delete state.weights[date];await saveAndSync();}
function saveSettings(){const k=document.getElementById('api-key-input');if(k)state.deepseekKey=k.value.trim();saveLocal();alert('Settings saved!');render();}
function exportData(){const data=JSON.stringify({entries:state.entries,weights:state.weights,goal:state.goal},null,2);const blob=new Blob([data],{type:'application/json'});const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download='food-diary-backup-'+getTodayKey()+'.json';a.click();}
function importData(event){const file=event.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=(e)=>{try{const imp=JSON.parse(e.target.result);if(confirm('Replace all current data?')){state.entries=imp.entries||{};state.weights=imp.weights||{};state.goal=imp.goal||2000;state.goalInput=String(state.goal);saveAndSync();alert('Data imported!');}}catch(err){alert('Invalid file');}};reader.readAsText(file);}

function bindInputs(){
  const bind=(id,key)=>{const el=document.getElementById(id);if(el)el.addEventListener('input',e=>{state[key]=e.target.value;if(key==='foodName'){state.lookupStatus='';state.lookupNote='';}});};
  bind('food-name-input','foodName');bind('calories-input','calories');bind('protein-input','protein');bind('carbs-input','carbs');bind('fat-input','fat');bind('weight-input','weightInput');bind('goal-input','goalInput');
  const ci=document.getElementById('calories-input');if(ci)ci.addEventListener('keydown',e=>{if(e.key==='Enter')addEntry();});
  const wi=document.getElementById('weight-input');if(wi)wi.addEventListener('keydown',e=>{if(e.key==='Enter')logWeight();});
}

function renderMacroBar(label,val,goal,color){const pct=Math.min((val/goal)*100,100);return '<div class="macro-bar-container"><div class="macro-bar-label"><span>'+label+'</span><span style="color:'+color+';">'+val+'g</span></div><div class="macro-bar-bg"><div class="macro-bar-fill" style="width:'+pct+'%;background:'+color+';"></div></div><div style="font-size:9px;color:#2a4a2a;margin-top:2px;">'+goal+'g goal</div></div>';}

function renderSyncBanner(){
  const status=state.syncStatus;
  if(status==='pushed')return '<div class="sync-banner">✓ Saved to Google Sheets'+(state.lastSync?' at '+state.lastSync:'')+'</div>';
  if(status==='pulled')return '<div class="sync-banner">✓ Loaded from Google Sheets'+(state.lastSync?' at '+state.lastSync:'')+'</div>';
  if(status==='pulling')return '<div class="sync-banner">🔄 Loading from Google Sheets…</div>';
  if(status==='blocked')return '<div class="sync-banner" style="color:#e09b30;border-color:#6e4a1a;background:#2a1a0a;">⚠️ Auto-sync blocked by browser. Use Export/Import to sync between devices.</div>';
  if(status==='empty')return '<div class="sync-banner">Sheet is empty — add some entries and they will save automatically.</div>';
  return '';
}

function renderToday(){
  const today=getTodayKey();const te=state.entries[today]||[];
  const tCal=te.reduce((s,e)=>s+e.cal,0);const tP=te.reduce((s,e)=>s+(e.protein||0),0);const tC=te.reduce((s,e)=>s+(e.carbs||0),0);const tF=te.reduce((s,e)=>s+(e.fat||0),0);
  const pct=Math.min((tCal/state.goal)*100,100);const rem=state.goal-tCal;
  const rc=tCal>state.goal?'#e05555':tCal>state.goal*0.85?'#e09b30':'#5ec45e';
  const tw=state.weights[today];const wd=Object.keys(state.weights).sort().reverse();const pd=wd.filter(d=>d!==today)[0];const pw=pd?state.weights[pd]:null;const diff=tw&&pw?(tw.value-pw.value).toFixed(1):null;
  const badges={high:'<span style="color:#5ec45e;font-size:11px;">✓ High</span>',medium:'<span style="color:#e09b30;font-size:11px;">~ Medium</span>',low:'<span style="color:#e05555;font-size:11px;">⚠ Low</span>'};
  let html=renderSyncBanner();
  html+='<div class="card ring-card"><svg width="86" height="86" viewBox="0 0 90 90"><circle cx="45" cy="45" r="38" fill="none" stroke="#1e2e1e" stroke-width="10"/><circle cx="45" cy="45" r="38" fill="none" stroke="'+rc+'" stroke-width="10" stroke-dasharray="'+(2*Math.PI*38)+'" stroke-dashoffset="'+(2*Math.PI*38*(1-pct/100))+'" stroke-linecap="round" transform="rotate(-90 45 45)"/><text x="45" y="43" text-anchor="middle" fill="#e8f0e8" font-size="15" font-weight="bold" font-family="Georgia">'+tCal.toLocaleString()+'</text><text x="45" y="57" text-anchor="middle" fill="#4a6e4a" font-size="10" font-family="Georgia">cal eaten</text></svg><div style="flex:1;"><div style="font-size:12px;color:#4a8c4a;">'+formatDate(today)+'</div><div style="margin-top:4px;"><span style="font-size:26px;font-weight:bold;color:'+rc+';">'+Math.abs(rem).toLocaleString()+'</span><span style="font-size:12px;color:#4a6e4a;margin-left:6px;">'+(rem>=0?'cal remaining':'cal over')+'</span></div><div style="background:#1e2e1e;border-radius:6px;height:5px;margin-top:8px;overflow:hidden;"><div style="width:'+pct+'%;height:100%;background:'+rc+';border-radius:6px;"></div></div>';
  if(tw)html+='<div style="margin-top:8px;font-size:12px;color:#4a8c4a;">⚖️ '+tw.value+' '+tw.unit+(diff?' <span style="color:'+(parseFloat(diff)>0?'#e09b30':'#5ec45e')+';margin-left:8px;">'+(parseFloat(diff)>0?'▲':'▼')+' '+Math.abs(diff)+tw.unit+'</span>':'')+'</div>';
  html+='</div></div>';
  if(te.length>0)html+='<div class="card" style="padding:14px 15px;"><div style="font-size:11px;color:#4a8c4a;font-weight:bold;margin-bottom:10px;">TODAY\'S MACROS</div><div style="display:flex;gap:12px;">'+renderMacroBar('Protein',tP,MG.protein,'#5ec45e')+renderMacroBar('Carbs',tC,MG.carbs,'#e09b30')+renderMacroBar('Fat',tF,MG.fat,'#e05585')+'</div></div>';
  html+='<div class="card"><div class="section-label">+ ADD FOOD</div>';
  if(!state.deepseekKey)html+='<div class="alert-banner">⚠️ Set your DeepSeek API key in ⚙️ Settings tab to enable AI lookup.</div>';
  html+='<div style="display:flex;gap:7px;margin-bottom:9px;"><input id="food-name-input" class="input-field" placeholder="e.g. 2 Weet-Bix with full cream milk" value="'+esc(state.foodName)+'" style="flex:1;"><button class="btn-secondary" onclick="handleLookup()"'+(state.lookupStatus==='loading'||!state.foodName.trim()?' disabled':'')+'>'+(state.lookupStatus==='loading'?'🔍…':'🤖 Look Up')+'</button></div>';
  if(state.lookupStatus==='done')html+='<div class="lookup-result"><div style="display:flex;justify-content:space-between;"><span style="color:#7ec87e;">Found: <strong>'+state.calories+' cal</strong> · P:'+state.protein+'g · C:'+state.carbs+'g · F:'+state.fat+'g</span>'+(badges[state.lookupConfidence]||'')+'</div>'+(state.lookupNote?'<div style="color:#4a7e5a;margin-top:3px;font-size:12px;">ℹ️ '+esc(state.lookupNote)+'</div>':'')+'</div>';
  if(state.lookupStatus==='error')html+='<div class="lookup-error">'+esc(state.lookupNote)+'</div>';
  html+='<div style="display:flex;gap:7px;margin-bottom:'+(state.showMacros?'7px':'0')+';"><input id="calories-input" class="input-field" type="number" placeholder="Calories" value="'+esc(state.calories)+'" style="flex:1;"><button class="btn-small" onclick="state.showMacros=!state.showMacros;render();">'+(state.showMacros?'▲':'▼')+' Macros</button></div>';
  if(state.showMacros)html+='<div style="display:flex;gap:6px;margin-bottom:7px;"><div style="flex:1;"><div style="font-size:10px;color:#5ec45e;margin-bottom:3px;">Protein g</div><input id="protein-input" class="input-field" type="number" value="'+esc(state.protein)+'" style="border-color:#5ec45e44;"></div><div style="flex:1;"><div style="font-size:10px;color:#e09b30;margin-bottom:3px;">Carbs g</div><input id="carbs-input" class="input-field" type="number" value="'+esc(state.carbs)+'" style="border-color:#e09b3044;"></div><div style="flex:1;"><div style="font-size:10px;color:#e05585;margin-bottom:3px;">Fat g</div><input id="fat-input" class="input-field" type="number" value="'+esc(state.fat)+'" style="border-color:#e0558544;"></div></div>';
  html+='<button class="btn btn-primary" style="width:100%;margin-top:7px;" onclick="addEntry()"'+(!state.foodName.trim()||!state.calories?' disabled':'')+'>Add ✓</button><div class="info-text">💡 Be specific — portion size, brand, cooking method all help.</div></div>';
  if(te.length===0)html+='<div class="empty-state">No entries yet — type a food and tap 🤖 Look Up!</div>';
  else html+=te.map(e=>'<div class="entry-card"><div><div class="entry-name">'+esc(e.name)+'</div><div class="entry-meta">'+e.time+((e.protein||e.carbs||e.fat)?' · P:'+e.protein+'g C:'+e.carbs+'g F:'+e.fat+'g':'')+'</div></div><div style="display:flex;align-items:center;gap:9px;"><span class="entry-cal">'+e.cal.toLocaleString()+'</span><button class="remove-btn" onclick="removeEntry(\''+today+'\','+e.id+')">×</button></div></div>').join('');
  return html;
}

function renderWeight(){
  const today=getTodayKey();const wd=Object.keys(state.weights).sort().reverse();
  let html='<div class="card" style="padding:16px;margin-top:12px;"><div class="section-label">⚖️ LOG TODAY\'S WEIGHT</div><div style="display:flex;gap:8px;margin-bottom:8px;"><input id="weight-input" class="input-field" type="number" step="0.1" placeholder="Weight in '+state.weightUnit+'" value="'+esc(state.weightInput)+'" style="flex:1;"><div class="unit-toggle"><button class="unit-btn '+(state.weightUnit==='kg'?'active':'')+'" onclick="state.weightUnit=\'kg\';saveLocal();render();">kg</button><button class="unit-btn '+(state.weightUnit==='lbs'?'active':'')+'" onclick="state.weightUnit=\'lbs\';saveLocal();render();">lbs</button></div></div><button class="btn btn-primary" style="width:100%;" onclick="logWeight()"'+(!state.weightInput?' disabled':'')+'>Save Weight</button></div>';
  if(wd.length>1){const r=wd.slice(0,14).reverse();const v=r.map(d=>state.weights[d].value);const mn=Math.min(...v)-1,mx=Math.max(...v)+1,rg=mx-mn||1;html+='<div class="card" style="padding:16px;margin-bottom:12px;"><div class="section-label">TREND</div><div style="display:flex;align-items:flex-end;gap:4px;height:80px;">';r.forEach((d,i)=>{const h=((v[i]-mn)/rg)*70+10;const il=i===r.length-1;html+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;"><div style="font-size:9px;color:'+(il?'#7ec87e':'#2a4a2a')+';">'+v[i]+'</div><div style="width:100%;height:'+h+'px;background:'+(il?'#5ec45e':'#2a5c2a')+';border-radius:3px 3px 0 0;"></div></div>';});html+='</div></div>';}
  if(wd.length===0)html+='<div class="empty-state">No weight entries yet!</div>';
  else html+=wd.map(date=>'<div class="entry-card" style="border-left-color:#1a4c2a;"><div style="font-size:13px;color:#7ec87e;">'+formatDate(date)+(date===today?' — Today':'')+'</div><div style="display:flex;align-items:center;gap:10px;"><span style="font-size:18px;font-weight:bold;color:#e8f0e8;">'+state.weights[date].value+' <span style="font-size:12px;color:#4a6e4a;">'+state.weights[date].unit+'</span></span><button class="remove-btn" onclick="removeWeight(\''+date+'\')">×</button></div></div>').join('');
  return html;
}

function renderHistory(){
  const today=getTodayKey();const ad=Object.keys(state.entries).sort().reverse();const ws={};
  ad.forEach(date=>{const wk=getWeekKey(date);if(!ws[wk])ws[wk]={days:[],tc:0,tp:0,tcar:0,tf:0,c:0};const de=state.entries[date]||[];ws[wk].days.push({date,total:de.reduce((s,e)=>s+e.cal,0)});ws[wk].tc+=de.reduce((s,e)=>s+e.cal,0);ws[wk].tp+=de.reduce((s,e)=>s+(e.protein||0),0);ws[wk].tcar+=de.reduce((s,e)=>s+(e.carbs||0),0);ws[wk].tf+=de.reduce((s,e)=>s+(e.fat||0),0);ws[wk].c++;});
  const wk=Object.keys(ws).sort().reverse().slice(0,8);
  if(wk.length===0)return '<div class="empty-state" style="padding:40px 0;">No history yet!</div>';
  return wk.map(w=>{const{days,tc,tp,tcar,tf,c}=ws[w];const avg=Math.round(tc/c);const ov=avg>state.goal;const we=new Date(w+'T00:00:00');we.setDate(we.getDate()+6);
    let h='<div class="card" style="padding:14px 15px;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;"><div><div style="font-size:13px;color:#7ec87e;font-weight:bold;">'+new Date(w+'T00:00:00').toLocaleDateString('en-AU',{day:'numeric',month:'short'})+' – '+we.toLocaleDateString('en-AU',{day:'numeric',month:'short'})+'</div><div style="font-size:11px;color:#3a5e3a;margin-top:2px;">'+c+' day'+(c!==1?'s':'')+' logged</div></div><div style="text-align:right;"><div style="font-size:11px;color:#3a5e3a;">Daily avg</div><div style="font-size:20px;font-weight:bold;color:'+(ov?'#e05555':'#5ec45e')+';">'+avg.toLocaleString()+'</div><div style="font-size:10px;color:#3a5e3a;">cal</div></div></div><div style="display:flex;gap:4px;align-items:flex-end;height:48px;margin-bottom:10px;">';
    days.sort((a,b)=>a.date.localeCompare(b.date)).forEach(({date,total})=>{const hh=Math.max((total/(state.goal*1.5))*44,3);h+='<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;"><div style="font-size:8px;color:'+(total>state.goal?'#e05555':'#3a6e3a')+';">'+(total>0?total:'')+'</div><div style="width:100%;height:'+hh+'px;background:'+(date===today?'#7ec87e':total>state.goal?'#8c3535':'#2a5c2a')+';border-radius:2px 2px 0 0;"></div><div style="font-size:8px;color:#2a4a2a;">'+new Date(date+'T00:00:00').toLocaleDateString('en-AU',{weekday:'narrow'})+'</div></div>';});
    h+='</div><div style="display:flex;gap:10px;margin-bottom:10px;">'+renderMacroBar('Avg Protein',Math.round(tp/c),MG.protein,'#5ec45e')+renderMacroBar('Avg Carbs',Math.round(tcar/c),MG.carbs,'#e09b30')+renderMacroBar('Avg Fat',Math.round(tf/c),MG.fat,'#e05585')+'</div><div style="display:flex;justify-content:space-between;font-size:11px;color:#3a5e3a;border-top:1px solid #1a2e1a;padding-top:8px;"><span>Total: <strong style="color:#7ec87e;">'+tc.toLocaleString()+' cal</strong></span><span style="color:'+(ov?'#e05555':'#5ec45e')+';">'+(ov?'▲ '+(avg-state.goal).toLocaleString()+' over':'▼ '+(state.goal-avg).toLocaleString()+' under')+'</span></div></div>';
    return h;}).join('');
}

function renderSettings(){
  return '<div class="settings-section" style="margin-top:12px;"><div class="section-label">🔑 DEEPSEEK API KEY</div><input id="api-key-input" class="api-key-input" type="password" placeholder="sk-..." value="'+esc(state.deepseekKey)+'"><div class="info-text">Needed for AI food lookup. Stored only in this browser.</div></div><button class="btn btn-primary" style="width:100%;margin-bottom:10px;" onclick="saveSettings()">Save Settings</button>'
  +'<div class="settings-section"><div class="section-label">☁️ SYNC BETWEEN DEVICES</div><div class="info-text" style="margin-bottom:10px;">To sync data between phone and desktop: Export on one device, then Import on the other.</div><button class="btn-small" style="width:100%;margin-bottom:8px;" onclick="pullFromSheet()">⬇️ Try Pull from Google Sheets</button>'+(state.lastSync?'<div style="font-size:11px;color:#2a5c2a;margin-top:6px;">Last sync: '+state.lastSync+'</div>':'')+'</div>'
  +'<div class="settings-section"><div class="section-label">💾 BACKUP &amp; RESTORE</div><button class="btn-small" style="width:100%;margin-bottom:8px;" onclick="exportData()">⬇️ Export All Data (JSON)</button><label class="btn-small" style="display:block;text-align:center;cursor:pointer;">⬆️ Import Backup<input type="file" accept=".json" style="display:none;" onchange="importData(event)"></label><div class="info-text">Export on one device, import on another to sync.</div></div>'
  +'<div class="settings-section"><div class="section-label">🎯 DAILY CALORIE GOAL</div><div style="display:flex;gap:8px;align-items:center;"><input id="goal-input" class="input-field" type="number" value="'+esc(state.goalInput)+'" style="flex:1;"><button class="btn-small" onclick="saveGoal()">Save</button></div></div>'
  +'<div style="text-align:center;color:#2a4a2a;font-size:11px;margin-top:20px;padding:10px;">🌿 Food Diary · made for Jimmy</div>';
}

function render(){
  const tabs=['today','weight','history','settings'];
  const labels={today:'📋 Today',weight:'⚖️ Weight',history:'📅 Summary',settings:'⚙️ Settings'};
  const content=state.activeTab==='today'?renderToday():state.activeTab==='weight'?renderWeight():state.activeTab==='history'?renderHistory():renderSettings();
  let header='<div class="header"><div class="header-inner"><div><div class="title">🌿 Food Diary</div><div class="subtitle">Jimmy\'s daily tracker'+(state.syncStatus==='pushed'?' <span style="color:#2a5c2a;">✓ saved</span>':state.syncStatus==='error'?' <span style="color:#e05555;">⚠ save error</span>':'')+'</div></div><div>';
  if(state.editGoal)header+='<div style="display:flex;gap:6px;align-items:center;"><input class="input-field" type="number" value="'+esc(state.goalInput)+'" style="width:68px;padding:4px 6px;border-color:#5ec45e;" oninput="state.goalInput=this.value;"><button class="btn-primary" style="padding:4px 10px;font-size:14px;border:none;border-radius:6px;cursor:pointer;" onclick="saveGoal()">✓</button></div>';
  else header+='<div class="goal-display" onclick="state.editGoal=true;render();">Goal: <span style="color:#7ec87e;">'+state.goal.toLocaleString()+' cal</span> ✏️</div>';
  header+='</div></div></div>';
  let tabHtml='<div class="tabs">';
  tabs.forEach(t=>{tabHtml+='<button class="tab '+(state.activeTab===t?'active':'')+'" onclick="state.activeTab=\''+t+'\';render();">'+labels[t]+'</button>';});
  tabHtml+='</div>';
  document.getElementById('app').innerHTML=header+'<div class="container">'+tabHtml+content+'</div>';
  bindInputs();
}

loadLocal();
// Restore API key from storage explicitly
const savedKey = localStorage.getItem('fd-deepseek-key');
if (savedKey) state.deepseekKey = savedKey;
render();
pullFromSheet();
</script>
</body>
